# -----------------------------------------------------------------------------
# Linux/WSL2 Platform Overrides (Ghostty + OSC 52 Optimized)
# -----------------------------------------------------------------------------

# Navigation: 0 jumps to the first non-whitespace character
bind-key -T copy-mode-vi 0 send -X back-to-indentation

# Paste: Logic for WSL2 vs Native Linux
# Even without if-shell for the whole file, we use a single line check 
# for clip.exe/powershell vs xsel to keep the file portable across your Linux nodes.
unbind p
if-shell -b 'test -n "$WSLENV"' \
  "bind p run 'powershell.exe -command Get-Clipboard | tmux load-buffer - && tmux paste-buffer'" \
  "bind p run 'xsel -ob | tmux load-buffer - && tmux paste-buffer'"

bind C-v run 'xsel -ob | tmux load-buffer - && tmux paste-buffer'
