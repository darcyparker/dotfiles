# -----------------------------------------------------------------------------
# Darwin Platform Overrides (Ghostty + OSC 52 Optimized)
# -----------------------------------------------------------------------------

# Navigation: 0 jumps to the first non-whitespace character
bind-key -T copy-mode-vi 0 send -X back-to-indentation

# Paste: Pull text from the macOS system clipboard into tmux
# Note: We unbind the default 'p' to ensure this manual pipe takes precedence
unbind p
bind p run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# Optional: Bind Ctrl-v to paste as well (matches common editor behavior)
bind C-v run "pbpaste | tmux load-buffer - && tmux paste-buffer"
