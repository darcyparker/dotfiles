# =============================================================================
# Global Prefix Settings
# =============================================================================
set -g prefix C-a
unbind C-b

# Send Ctrl-a to programs inside tmux by pressing Ctrl-a twice
bind C-a send-prefix

# =============================================================================
# General Options
# =============================================================================
set-option -g focus-events on
set-option -s escape-time 0
set-option -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Enable mouse mode
set -g mouse on
bind m set -g mouse \; display "Mouse is #{?#{mouse},on,off}"

# Use vi keys in copy mode and command line
setw -g mode-keys vi
set -g status-keys vi
setw -g xterm-keys on

# =============================================================================
# Key Bindings
# =============================================================================
# Reload configuration
bind r source-file ~/.tmux.conf \; display "✅ Reloaded ~/.tmux.conf"

# Window/Pane Splitting
bind | split-window -h
bind '\' split-window -h
bind - split-window -v

# Pane Navigation (h,j,k,l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window Navigation (Ctrl-h, Ctrl-l)
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Window Reordering
bind-key -r C-Left swap-window -t -1\; select-window -t -1
bind-key -r C-Right swap-window -t +1\; select-window -t +1

# Pane Resizing (H,J,K,L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy Mode Bindings
#  [ to switch to copy mode
#  v to start visual mode
#  V to start visual mode (Visual Line)
#  Ctrl-v to toggle visual block
#  y to yank selected text into copy buffer
#  p to paste text from buffer
#  Escape to exit copy mode
#  use vi movements when working inside the tmux buffer
#  See <prefix>-:list-keys -t copy-mode-vi
unbind [
bind [ copy-mode
unbind p
bind p paste-buffer

bind-key -T edit-mode-vi Up send-keys -X history-up
bind-key -T edit-mode-vi Down send-keys -X history-down
unbind-key -T copy-mode-vi Space  ; bind-key -T copy-mode-vi v send-keys -X begin-selection
unbind-key -T copy-mode-vi C-v    ; bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
unbind-key -T copy-mode-vi y      ; bind-key -T copy-mode-vi y send-keys -X copy-selection
unbind-key -T copy-mode-vi Escape ; bind-key -T copy-mode-vi Escape send-keys -X cancel

# Toggle to last window
bind-key C-x last-window

# =============================================================================
# UI & Status Bar
# =============================================================================
set -g status-justify centre
set -g status-interval 60
set -g status-left-length 40
set -g status-left "#[fg=green]Session: #S #[fg=yellow]#I #[fg=cyan]#P"
set -g status-right "#[fg=cyan]%d %b %R"

setw -g monitor-activity on
set -g visual-activity on

# =============================================================================
# External Configuration & Final Linkage
# =============================================================================
# Source platform and theme settings
source-file ~/.tmux.platform.conf
source-file ~/.tmux.solarizeddark.conf

# FINAL OVERRIDES: Ghostty & Modern Terminal Integration
# These must remain at the end to ensure they take precedence
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB,*:clipboard"
set -as terminal-overrides ",*:Tc"
set -s set-clipboard on

# Remote Session Logic: Hide status bar if connected via SSH
if-shell '[[ -n "$SSH_CLIENT" ]]' 'set -g status off'

# F12 Mode Toggle: Engage/Disengage local control for remote proxy sessions
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=color245,bg=color235" \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S
